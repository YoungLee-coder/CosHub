version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      nextjs:
        patterns:
          - "next"
          - "next-themes"
          - "eslint-config-next"
      radix-ui:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind-and-css:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "tw-animate-css"
          - "class-variance-authority"
          - "clsx"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@types/react*"
          - "eslint-config-next"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "tw-animate-css"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
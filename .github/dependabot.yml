# Dependabot 版本更新配置
# 文档: https://docs.github.com/code-security/reference/supply-chain-security/dependabot-options-reference
version: 2

updates:
  # ───────────────────────── npm (pnpm) 依赖 ─────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    # 仅在必要时才放宽版本范围，保留 caret(^) 语义
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10

    # 冷却期(GA)：新版本发布后等待一段时间再提 PR，规避刚发布即出问题的版本
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-major-days: 14

    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"

    # 不更新任何大版本(major)，留给人工审查
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    # 按主题分组，减少 PR 噪音；同组的 minor/patch 合并到一个 PR
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      nextjs:
        patterns:
          - "next"
          - "next-themes"
          - "eslint-config-next"
      radix-ui:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind-and-css:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "tw-animate-css"
          - "class-variance-authority"
          - "clsx"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@types/react*"
          - "eslint-config-next"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "tw-animate-css"

  # ─────────────────────── GitHub Actions 依赖 ───────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      github-actions:
        patterns:
          - "*"
